<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img">
  <!--
    すぴたろう 開発用仮イラスト(temporary artwork)
    正式なキービジュアルではありません。基本図形のみで構成した表示検証用素材。
    差し替え手順: docs/temporary-character-artwork.md
  -->
  <!-- 尻尾(2本、からだの後ろから下外側へ) -->
  <g fill="#ffffff" stroke="#6f95c2" stroke-width="6">
    <ellipse cx="112" cy="398" rx="22" ry="52" transform="rotate(55 112 398)" />
    <ellipse cx="400" cy="398" rx="22" ry="52" transform="rotate(-55 400 398)" />
  </g>
  <circle cx="70" cy="426" r="11" fill="#a5d5ef" />
  <circle cx="442" cy="426" r="11" fill="#a5d5ef" />

  <!-- 耳(大きめ) -->
  <g fill="#ffffff" stroke="#6f95c2" stroke-width="6">
    <ellipse cx="172" cy="135" rx="44" ry="80" transform="rotate(-18 172 135)" />
    <ellipse cx="340" cy="135" rx="44" ry="80" transform="rotate(18 340 135)" />
  </g>
  <g fill="#e3f2fb">
    <ellipse cx="172" cy="140" rx="23" ry="50" transform="rotate(-18 172 140)" />
    <ellipse cx="340" cy="140" rx="23" ry="50" transform="rotate(18 340 140)" />
  </g>

  <!-- 胴体(頭と一体の丸いからだ) -->
  <ellipse cx="256" cy="292" rx="148" ry="152" fill="#ffffff" stroke="#6f95c2" stroke-width="7" />

  <!-- 手(短い前あし) -->
  <g fill="#ffffff" stroke="#6f95c2" stroke-width="6">
    <ellipse cx="128" cy="330" rx="20" ry="34" transform="rotate(24 128 330)" />
    <ellipse cx="384" cy="330" rx="20" ry="34" transform="rotate(-24 384 330)" />
  </g>

  <!-- あし -->
  <g fill="#ffffff" stroke="#6f95c2" stroke-width="6">
    <ellipse cx="200" cy="430" rx="34" ry="20" />
    <ellipse cx="312" cy="430" rx="34" ry="20" />
  </g>

  <!-- 額のひし形 -->
  <polygon points="256,168 278,193 256,218 234,193" fill="#7fc3e8" stroke="#6f95c2" stroke-width="4" />

  <!-- 目(大きな青い目) -->
  <g fill="#33549c">
    <ellipse cx="204" cy="262" rx="27" ry="35" />
    <ellipse cx="308" cy="262" rx="27" ry="35" />
  </g>
  <g fill="#ffffff">
    <circle cx="196" cy="250" r="10" />
    <circle cx="213" cy="274" r="4.5" />
    <circle cx="300" cy="250" r="10" />
    <circle cx="317" cy="274" r="4.5" />
  </g>

  <!-- ほほ -->
  <g fill="#ddd5f0" opacity="0.8">
    <ellipse cx="158" cy="298" rx="17" ry="10" />
    <ellipse cx="354" cy="298" rx="17" ry="10" />
  </g>

  <!-- くち(やわらかい笑み) -->
  <path d="M 240 316 Q 256 330 272 316" fill="none" stroke="#27427e" stroke-width="6" stroke-linecap="round" />
</svg>
